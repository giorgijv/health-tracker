# Render blueprint: deploys the API as a Node web service.
# The web app is hosted separately on GitHub Pages (see .github/workflows/deploy-pages.yml).
# Fill the `sync: false` env vars in the Render dashboard (secrets / environment-specific).
# See DEPLOY.md for the full walkthrough.

services:
  - type: web
    name: health-tracker-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w apps/api
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Your GitHub Pages origin — NO trailing path, NO trailing slash.
      # e.g. https://giorgijv.github.io
      - key: WEB_ORIGIN
        sync: false
