# Render blueprint: deploys the API as a Node web service and the PWA as a
# static site. Fill the `sync: false` env vars in the Render dashboard (they're
# secrets / environment-specific). See DEPLOY.md for the full walkthrough.

services:
  - type: web
    name: health-tracker-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w apps/api
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # The deployed web origin, e.g. https://health-tracker-web.onrender.com
      - key: WEB_ORIGIN
        sync: false

  - type: web
    name: health-tracker-web
    runtime: static
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w apps/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      # The deployed API URL, e.g. https://health-tracker-api.onrender.com
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback: serve index.html for client-side routes.
      - type: rewrite
        source: /*
        destination: /index.html
